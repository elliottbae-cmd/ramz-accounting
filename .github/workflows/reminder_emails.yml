name: Revenue Band Reminder Emails

on:
  # ── Manual trigger (for testing or one-off sends) ──────────────────────────
  workflow_dispatch:
    inputs:
      email_mode:
        description: "Which email to send"
        required: true
        default: "initial"
        type: choice
        options:
          - "initial"    # Monday — GM only
          - "tuesday"    # Tuesday reminder — GM + DM cc
          - "wednesday"  # Wednesday final reminder — GM + DM + CEO cc

  # ── Scheduled triggers ─────────────────────────────────────────────────────
  # Fires every hour Mon–Thu (UTC). send_reminders.py reads gm_email_send_day
  # and reminder_1/2/3_time from app_settings and skips if the current CT
  # hour doesn't match a configured send window. Change send day and times
  # from the Email Settings page in the app — no yml changes needed.
  schedule:
    - cron: "0 * * * *"       # Every hour every day (UTC)

jobs:
  send-reminders:
    name: Send revenue band emails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install supabase sendgrid

      - name: Send emails
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          SENDGRID_API_KEY:    ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          # GM_PORTAL_URL falls back to the default hardcoded in send_reminders.py
          # Set this secret in GitHub if you ever need to override it.
          CEO_EMAIL:           ${{ secrets.CEO_EMAIL }}
          # Manual dispatch uses the dropdown selection.
          # Scheduled runs auto-detect from day of week.
          EMAIL_MODE:          ${{ github.event.inputs.email_mode || '' }}
        run: python send_reminders.py
