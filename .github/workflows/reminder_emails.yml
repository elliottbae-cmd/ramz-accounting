name: Revenue Band Reminder Emails

on:
  # ── Manual trigger (for testing or one-off sends) ──────────────────────────
  workflow_dispatch:
    inputs:
      email_mode:
        description: "Which email to send"
        required: true
        default: "initial"
        type: choice
        options:
          - "initial"    # Monday — GM only
          - "tuesday"    # Tuesday reminder — GM + DM cc
          - "wednesday"  # Wednesday final reminder — GM + DM + CEO cc

  # ── Scheduled triggers ─────────────────────────────────────────────────────
  # Currently DISABLED. Uncomment when you're ready to go live.
  # All times UTC. Ram-Z is Central Time:
  #   CDT (Apr–Nov): UTC-5  →  8am CT = 13:00 UTC | Noon CT = 17:00 UTC | 5pm CT = 22:00 UTC
  #   CST (Nov–Mar): UTC-6  →  8am CT = 14:00 UTC | Noon CT = 18:00 UTC | 5pm CT = 23:00 UTC
  #
  # schedule:
  #   # Monday — initial email (one send, morning)
  #   - cron: "0 13 * * 1"     # 8am CT Monday
  #
  #   # Tuesday — 3 reminders (GM + DM cc)
  #   - cron: "0 13 * * 2"     # 8am CT Tuesday
  #   - cron: "0 17 * * 2"     # Noon CT Tuesday
  #   - cron: "0 22 * * 2"     # 5pm CT Tuesday
  #
  #   # Wednesday — 3 reminders (GM + DM + CEO cc)
  #   - cron: "0 13 * * 3"     # 8am CT Wednesday
  #   - cron: "0 17 * * 3"     # Noon CT Wednesday
  #   - cron: "0 22 * * 3"     # 5pm CT Wednesday

jobs:
  send-reminders:
    name: Send revenue band emails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install supabase sendgrid

      - name: Send emails
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          SENDGRID_API_KEY:    ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          GM_PORTAL_URL:       ${{ secrets.GM_PORTAL_URL }}
          CEO_EMAIL:           ${{ secrets.CEO_EMAIL }}
          # Manual dispatch uses the dropdown selection.
          # Scheduled runs auto-detect from day of week.
          EMAIL_MODE:          ${{ github.event.inputs.email_mode || '' }}
        run: python send_reminders.py
