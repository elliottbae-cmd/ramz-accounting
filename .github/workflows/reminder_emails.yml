name: Revenue Band Reminder Emails

on:
  # ── Manual trigger (for testing or one-off sends) ──────────────────────────
  workflow_dispatch:
    inputs:
      email_mode:
        description: "Which email to send"
        required: true
        default: "initial"
        type: choice
        options:
          - "initial"    # Monday — GM only
          - "tuesday"    # Tuesday reminder — GM + DM cc
          - "wednesday"  # Wednesday final reminder — GM + DM + CEO cc

  # ── Scheduled triggers ─────────────────────────────────────────────────────
  # Fires Mon–Thu at 8am, noon, and 5pm CT (covers any send day configured
  # in Email Settings). send_reminders.py reads app_settings.gm_email_send_day
  # and exits early if today is not a configured send day.
  #
  # All times UTC. Ram-Z is Central Time:
  #   CDT (Apr–Nov): UTC-5  →  8am CT = 13:00 UTC | Noon CT = 17:00 UTC | 5pm CT = 22:00 UTC
  #   CST (Nov–Mar): UTC-6  →  8am CT = 14:00 UTC | Noon CT = 18:00 UTC | 5pm CT = 23:00 UTC
  #
  schedule:
    - cron: "0 13 * * 1-4"   # 8am CT  Mon–Thu
    - cron: "0 17 * * 1-4"   # Noon CT Mon–Thu
    - cron: "0 22 * * 1-4"   # 5pm CT  Mon–Thu

jobs:
  send-reminders:
    name: Send revenue band emails
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install supabase sendgrid

      - name: Send emails
        env:
          SUPABASE_URL:        ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY:        ${{ secrets.SUPABASE_KEY }}
          SENDGRID_API_KEY:    ${{ secrets.SENDGRID_API_KEY }}
          SENDGRID_FROM_EMAIL: ${{ secrets.SENDGRID_FROM_EMAIL }}
          # GM_PORTAL_URL falls back to the default hardcoded in send_reminders.py
          # Set this secret in GitHub if you ever need to override it.
          CEO_EMAIL:           ${{ secrets.CEO_EMAIL }}
          # Manual dispatch uses the dropdown selection.
          # Scheduled runs auto-detect from day of week.
          EMAIL_MODE:          ${{ github.event.inputs.email_mode || '' }}
        run: python send_reminders.py
