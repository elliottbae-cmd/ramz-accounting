name: Daily Supabase Backup

on:
  schedule:
    # Runs at 2:00 AM CT (8:00 AM UTC) every day
    - cron: "0 8 * * *"
  workflow_dispatch:
    # Allow manual trigger from GitHub Actions tab

jobs:
  backup:
    name: Export Supabase tables to CSV
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install supabase

      - name: Run backup script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python backup_db.py

      - name: Commit and push backup files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add backups/
          git diff --cached --quiet && echo "No changes to commit" || \
            git commit -m "chore: daily DB backup $(date -u +%Y-%m-%d)" && \
            git push
